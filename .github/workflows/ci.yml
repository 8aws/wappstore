name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Ejecuta las JS actions sobre Node 24 (default desde 2026-06-16); silencia el aviso de deprecación.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build & docker sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests
        run: npm test

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: wappstore:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
