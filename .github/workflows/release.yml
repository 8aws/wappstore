name: Release

# Se dispara al empujar un tag semver, p.ej:  git tag v1.2.0 && git push origin v1.2.0
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # crear la GitHub Release
  packages: write # publicar en GHCR

jobs:
  release:
    name: Build, push & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Docker Hub es opcional: solo se publica allí si existen los secretos.
      - name: Check Docker Hub configuration
        id: dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub: ENABLED"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Secretos DOCKERHUB_USERNAME/DOCKERHUB_TOKEN no configurados — se omite el push a Docker Hub."
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            name=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/wappstore,enable=${{ steps.dockerhub.outputs.enabled }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
