<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Iniciar sesión — WAppStore</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="logo"><a href="/">WAppStore</a></div>
  <h2 data-i18n="auth.login">Iniciar sesión</h2>
  <p class="subtitle">Accede a tu cuenta para gestionar tus apps</p>

  <form id="login-form">
    <div class="form-group">
      <label data-i18n="auth.email">Correo electrónico</label>
      <input id="email" type="email" required autocomplete="email" data-i18n-placeholder="auth.email" placeholder="Correo electrónico"/>
    </div>
    <div class="form-group">
      <label data-i18n="auth.password">Contraseña</label>
      <input id="password" type="password" required autocomplete="current-password" placeholder="••••••••"/>
    </div>
    <div id="login-error" class="alert alert-error mt-1" style="display:none"></div>
    <button type="submit" id="login-btn" class="btn btn-primary w-full mt-2">
      <span data-i18n="auth.submit_login">Entrar</span>
    </button>
  </form>

  <div class="auth-divider"><span>o</span></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem">
    <span class="text-muted text-small" data-i18n="auth.no_account">¿No tienes cuenta?</span>
    <a href="/register.html" class="btn btn-outline btn-sm" data-i18n="auth.register">Crear cuenta</a>
  </div>
</div>

<div id="lang-float" style="position:fixed;bottom:1.5rem;right:1.5rem"></div>

<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const u = Auth.getUser();
    window.location.href = (u?.role === 'admin' || u?.role === 'developer') ? '/dashboard.html' : '/';
  }
  I18N.renderToggle(document.getElementById('lang-float'));
  I18N.applyAll();
  document.addEventListener('langchange', () => I18N.applyAll());

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = '…';
    try {
      const data = await API.login(
        document.getElementById('email').value,
        document.getElementById('password').value
      );
      Auth.setSession(data.token, data.user);
      const next = new URLSearchParams(location.search).get('next') || '/';
      window.location.href = next;
    } catch (ex) {
      err.textContent = ex.message;
      err.style.display = 'flex';
      btn.disabled = false; btn.textContent = I18N.t('auth.submit_login');
    }
  });
</script>
</body>
</html>
