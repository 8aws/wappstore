<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mi perfil — WAppStore</title>
  <meta name="theme-color" content="#5B4BD6"/>
  <link rel="icon" type="image/png" href="/icons/favicon-32.png"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .profile-wrap { max-width: 560px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .profile-wrap h1 { font-size: 1.6rem; margin: 0 0 1.5rem; }
    .form-row { margin-bottom: 1rem; }
    .form-row label { display:block; font-size:.85rem; font-weight:600; margin-bottom:.35rem; color:var(--muted); }
    .form-row input { width:100%; }
  </style>
</head>
<body>
<nav class="nav" id="main-nav"></nav>

<div class="profile-wrap">
  <h1>👤 <span data-i18n="profile.title">Mi perfil</span></h1>

  <div class="detail-card">
    <h3 data-i18n="profile.account">Datos de la cuenta</h3>
    <form id="profile-form" class="mt-2">
      <div class="form-row"><label data-i18n="profile.name">Nombre</label><input id="p-name" type="text" required/></div>
      <div class="form-row"><label data-i18n="profile.email">Email</label><input id="p-email" type="email" required/></div>
      <div class="form-row"><label data-i18n="profile.role">Rol</label><input id="p-role" type="text" disabled/></div>
      <button class="btn btn-primary" type="submit" data-i18n="profile.save">Guardar cambios</button>
    </form>
  </div>

  <div class="detail-card mt-2">
    <h3 data-i18n="profile.change_pw">Cambiar contraseña</h3>
    <form id="pw-form" class="mt-2">
      <div class="form-row"><label data-i18n="profile.cur_pw">Contraseña actual</label><input id="pw-cur" type="password" required/></div>
      <div class="form-row"><label data-i18n="profile.new_pw">Nueva contraseña (mín. 6)</label><input id="pw-new" type="password" minlength="6" required/></div>
      <div class="form-row"><label data-i18n="profile.repeat_pw">Repetir nueva contraseña</label><input id="pw-new2" type="password" minlength="6" required/></div>
      <button class="btn btn-primary" type="submit" data-i18n="profile.update_pw">Actualizar contraseña</button>
    </form>
  </div>
</div>

<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
if (!Auth.isLoggedIn()) location.href = '/login.html';

async function load() {
  try {
    const p = await API.getProfile();
    document.getElementById('p-name').value  = p.name;
    document.getElementById('p-email').value = p.email;
    document.getElementById('p-role').value  = p.role;
  } catch (e) { toast.error(e.message || 'Error'); }
}

document.getElementById('profile-form').addEventListener('submit', async e => {
  e.preventDefault();
  try {
    const data = await API.updateProfile({
      name:  document.getElementById('p-name').value,
      email: document.getElementById('p-email').value,
    });
    const u = Auth.getUser(); Auth.setSession(Auth.getToken(), { ...u, name: data.name, email: data.email });
    toast.success('Perfil actualizado');
    document.querySelector('#main-nav .nav-user strong')?.replaceChildren(document.createTextNode(data.name));
  } catch (e) { toast.error(e.message || 'Error'); }
});

document.getElementById('pw-form').addEventListener('submit', async e => {
  e.preventDefault();
  const cur = document.getElementById('pw-cur').value;
  const nw  = document.getElementById('pw-new').value;
  const nw2 = document.getElementById('pw-new2').value;
  if (nw !== nw2) return toast.error('Las contraseñas no coinciden');
  try {
    await API.changePassword(cur, nw);
    toast.success('Contraseña actualizada');
    e.target.reset();
  } catch (e) { toast.error(e.message || 'Error'); }
});

load();
</script>
</body>
</html>
