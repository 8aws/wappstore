<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Mi Launcher — WAppStore</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#5B4BD6"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="icon" type="image/png" href="/icons/favicon-32.png"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .launcher-wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .launcher-head { display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .launcher-head h1 { font-size:1.6rem; margin:0; }
    .launcher-head p  { color:var(--muted); margin:.25rem 0 0; font-size:.9rem; }
    .toolbar { display:flex; gap:.5rem; flex-wrap:wrap; }

    .folder-section { margin-bottom:1.75rem; border-radius:var(--radius-lg); transition:background var(--transition); }
    .folder-section.drop-hover { background:var(--surface2); outline:2px dashed var(--primary); outline-offset:4px; }
    .folder-head { display:flex; align-items:center; gap:.5rem; margin:0 0 .75rem; padding:.35rem .25rem; }
    .folder-head .ttl { font-weight:700; font-size:1rem; }
    .folder-head .cnt { color:var(--muted); font-size:.82rem; }
    .folder-head .sp  { flex:1; }
    .folder-head button { border:none; background:transparent; cursor:pointer; font-size:.95rem; opacity:.6; padding:.15rem .3rem; border-radius:6px; }
    .folder-head button:hover { opacity:1; background:var(--surface2); }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:1.25rem; min-height:40px; }
    .tile { position:relative; display:flex; flex-direction:column; align-items:center; gap:.6rem;
            text-decoration:none; color:var(--text); padding:1rem .5rem; border-radius:var(--radius-lg);
            transition:transform var(--transition), background var(--transition); cursor:grab; }
    .tile:hover { transform:translateY(-4px); background:var(--surface2); }
    .tile.dragging { opacity:.4; }
    .tile .ic { width:76px; height:76px; border-radius:20px; object-fit:cover; box-shadow:var(--shadow);
                background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:2.2rem; pointer-events:none; }
    .tile .nm { font-size:.85rem; font-weight:600; text-align:center; line-height:1.2; max-width:110px;
                overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; pointer-events:none; }
    .tile .act { position:absolute; top:.25rem; right:.25rem; display:flex; gap:.2rem; opacity:0; transition:opacity var(--transition); }
    .tile:hover .act { opacity:1; }
    .tile .act button { width:24px; height:24px; border-radius:50%; border:none; color:#fff; cursor:pointer; font-size:.78rem; line-height:1; }
    .tile .act .rm { background:var(--error); }
    .tile .act .mv { background:var(--primary); }

    .empty { text-align:center; padding:4rem 1rem; color:var(--muted); }
    .empty .big { font-size:3rem; margin-bottom:1rem; }

    .move-menu { position:fixed; z-index:100; background:var(--surface); border:1px solid var(--border);
                 border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:.35rem; min-width:180px; }
    .move-menu button { display:block; width:100%; text-align:left; border:none; background:transparent; color:var(--text);
                        padding:.5rem .6rem; border-radius:8px; cursor:pointer; font-size:.88rem; }
    .move-menu button:hover { background:var(--surface2); }
  </style>
</head>
<body>
<nav class="nav" id="main-nav"></nav>

<div class="launcher-wrap">
  <div class="launcher-head">
    <div>
      <h1>🚀 Mi Launcher</h1>
      <p>Arrastra para reordenar o mover a carpetas. Instálalo como app desde el navegador.</p>
    </div>
    <div class="toolbar">
      <button id="new-folder" class="btn btn-ghost btn-sm">📁 Nueva carpeta</button>
      <button id="install-btn" class="btn btn-outline btn-sm" style="display:none">⬇ Instalar</button>
      <a href="/" class="btn btn-primary btn-sm">＋ Añadir apps</a>
    </div>
  </div>
  <div id="launcher-body"></div>
</div>

<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const body = document.getElementById('launcher-body');
const state = { apps: [], folders: [] };
let draggedId = null;

async function load() {
  if (!Auth.isLoggedIn()) {
    body.innerHTML = `<div class="empty"><div class="big">🔒</div>
      <h3>Inicia sesión para usar tu launcher</h3>
      <p>Guarda los enlaces de las apps que adquieras y lánzalas desde aquí.</p>
      <a class="btn btn-primary mt-2" href="/login.html">Iniciar sesión</a></div>`;
    document.getElementById('new-folder').style.display = 'none';
    return;
  }
  try {
    const [apps, folders] = await Promise.all([API.getLibrary(), API.getFolders()]);
    state.apps = apps; state.folders = folders;
  } catch { body.innerHTML = `<div class="empty"><div class="big">⚠️</div><h3>No se pudo cargar tu launcher</h3></div>`; return; }
  render();
}

function tileHtml(a) {
  return `<a class="tile" draggable="true" data-id="${a.id}" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" title="${esc(a.name)}">
      <span class="act">
        <button class="mv" data-mv="${a.id}" title="Mover a carpeta">📁</button>
        <button class="rm" data-rm="${a.id}" title="Quitar">✕</button>
      </span>
      ${a.logo_url ? `<img class="ic" src="${esc(a.logo_url)}" alt="${esc(a.name)}"/>` : `<span class="ic">📦</span>`}
      <span class="nm">${esc(a.name)}</span>
    </a>`;
}

function sectionHtml(folder, apps) {
  const fid = folder ? folder.id : '';
  const head = folder
    ? `<div class="folder-head" data-folder="${fid}">
         <span>${esc(folder.icon||'📁')}</span><span class="ttl">${esc(folder.name)}</span>
         <span class="cnt">${apps.length}</span><span class="sp"></span>
         <button data-ren="${fid}" title="Renombrar">✎</button>
         <button data-del="${fid}" title="Eliminar carpeta">🗑</button>
       </div>`
    : `<div class="folder-head" data-folder=""><span>🗂️</span><span class="ttl">Sin carpeta</span><span class="cnt">${apps.length}</span></div>`;
  return `<section class="folder-section" data-drop="${fid}">${head}
      <div class="grid">${apps.map(tileHtml).join('') || '<p class="text-muted" style="padding:.5rem">Arrastra apps aquí…</p>'}</div>
    </section>`;
}

function render() {
  if (!state.apps.length && !state.folders.length) {
    body.innerHTML = `<div class="empty"><div class="big">📭</div>
      <h3>Tu launcher está vacío</h3>
      <p>Explora la tienda y pulsa “➕ Añadir a mi launcher” en cualquier app.</p>
      <a class="btn btn-primary mt-2" href="/">Explorar la tienda</a></div>`;
    return;
  }
  const byFolder = id => state.apps.filter(a => (a.folder_id ?? null) === id);
  let html = state.folders.map(f => sectionHtml(f, byFolder(f.id))).join('');
  html += sectionHtml(null, byFolder(null));   // sin carpeta al final
  body.innerHTML = html;
  wire();
}

function wire() {
  body.querySelectorAll('.tile').forEach(t => {
    t.addEventListener('dragstart', e => { draggedId = +t.dataset.id; t.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    t.addEventListener('dragend',   () => { draggedId = null; t.classList.remove('dragging'); });
    t.addEventListener('dragover',  e => e.preventDefault());
    t.addEventListener('drop',      e => { e.preventDefault(); e.stopPropagation(); onDropOnTile(+t.dataset.id); });
  });
  body.querySelectorAll('.folder-section').forEach(s => {
    s.addEventListener('dragover', e => { e.preventDefault(); s.classList.add('drop-hover'); });
    s.addEventListener('dragleave', () => s.classList.remove('drop-hover'));
    s.addEventListener('drop', e => { e.preventDefault(); s.classList.remove('drop-hover');
      const fid = s.dataset.drop === '' ? null : +s.dataset.drop; onDropOnFolder(fid); });
  });
  body.querySelectorAll('[data-rm]').forEach(b => b.addEventListener('click', async e => {
    e.preventDefault(); e.stopPropagation();
    try { await API.removeFromLibrary(b.dataset.rm); state.apps = state.apps.filter(a=>a.id!=b.dataset.rm); render(); toast.success('Quitada'); }
    catch (err) { toast.error(err.message||'Error'); }
  }));
  body.querySelectorAll('[data-mv]').forEach(b => b.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation(); openMoveMenu(+b.dataset.mv, b);
  }));
  body.querySelectorAll('[data-ren]').forEach(b => b.addEventListener('click', () => renameFolder(+b.dataset.ren)));
  body.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => deleteFolder(+b.dataset.del)));
}

async function persistOrder() { try { await API.reorderLibrary(state.apps.map(a=>a.id)); } catch {} }

async function onDropOnTile(targetId) {
  if (!draggedId || draggedId === targetId) return;
  const dragged = state.apps.find(a=>a.id===draggedId);
  const target  = state.apps.find(a=>a.id===targetId);
  if (!dragged || !target) return;
  if ((dragged.folder_id??null) !== (target.folder_id??null)) {
    dragged.folder_id = target.folder_id ?? null;
    try { await API.setAppFolder(dragged.id, dragged.folder_id); } catch {}
  }
  state.apps = state.apps.filter(a=>a.id!==draggedId);
  const idx = state.apps.findIndex(a=>a.id===targetId);
  state.apps.splice(idx, 0, dragged);
  render(); persistOrder();
}

async function onDropOnFolder(folderId) {
  if (!draggedId) return;
  const dragged = state.apps.find(a=>a.id===draggedId);
  if (!dragged || (dragged.folder_id??null) === folderId) return;
  dragged.folder_id = folderId;
  try { await API.setAppFolder(dragged.id, folderId); render(); }
  catch (err) { toast.error(err.message||'Error'); }
}

function openMoveMenu(appId, anchor) {
  document.querySelector('.move-menu')?.remove();
  const menu = document.createElement('div');
  menu.className = 'move-menu';
  const opts = [`<button data-f="">🗂️ Sin carpeta</button>`,
    ...state.folders.map(f=>`<button data-f="${f.id}">${esc(f.icon||'📁')} ${esc(f.name)}</button>`)].join('');
  menu.innerHTML = opts;
  document.body.appendChild(menu);
  const r = anchor.getBoundingClientRect();
  menu.style.top = `${r.bottom+6}px`; menu.style.left = `${Math.min(r.left, innerWidth-200)}px`;
  menu.querySelectorAll('button').forEach(btn => btn.addEventListener('click', async () => {
    const fid = btn.dataset.f === '' ? null : +btn.dataset.f;
    const a = state.apps.find(x=>x.id===appId); if (a) { a.folder_id = fid;
      try { await API.setAppFolder(appId, fid); render(); } catch(e){ toast.error(e.message||'Error'); } }
    menu.remove();
  }));
  setTimeout(() => document.addEventListener('click', () => menu.remove(), { once:true }), 0);
}

document.getElementById('new-folder').addEventListener('click', async () => {
  const name = prompt('Nombre de la carpeta:'); if (!name) return;
  try { const f = await API.createFolder(name.trim(), '📁'); state.folders.push(f); render(); toast.success('Carpeta creada'); }
  catch (e) { toast.error(e.message||'Error'); }
});
async function renameFolder(id) {
  const f = state.folders.find(x=>x.id===id); if (!f) return;
  const name = prompt('Nuevo nombre:', f.name); if (!name) return;
  try { const u = await API.updateFolder(id, { name: name.trim() }); Object.assign(f, u); render(); }
  catch (e) { toast.error(e.message||'Error'); }
}
async function deleteFolder(id) {
  if (!confirm('¿Eliminar la carpeta? Sus apps volverán a “Sin carpeta”.')) return;
  try { await API.deleteFolder(id);
    state.folders = state.folders.filter(x=>x.id!==id);
    state.apps.forEach(a=>{ if (a.folder_id===id) a.folder_id=null; });
    render(); toast.success('Carpeta eliminada'); }
  catch (e) { toast.error(e.message||'Error'); }
}

// Prompt de instalación PWA
let deferredPrompt = null;
const installBtn = document.getElementById('install-btn');
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; installBtn.style.display=''; });
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; installBtn.style.display='none';
});

load();
</script>
</body>
</html>
