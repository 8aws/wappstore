    <rect x="96"  y="96"  width="148" height="148" rx="36" fill="#ffffff" opacity="0.96"/>
    <rect x="268" y="96"  width="148" height="148" rx="36" fill="#ffffff" opacity="0.82"/>
    <rect x="96"  y="268" width="148" height="148" rx="36" fill="#ffffff" opacity="0.82"/>
    <!-- Tile destacada con check -->
    <rect x="268" y="268" width="148" height="148" rx="36" fill="#ffffff" opacity="0.96"/>
    <circle cx="342" cy="342" r="44" fill="#00C896"/>
    <path d="M322 343l14 14 26-28" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
